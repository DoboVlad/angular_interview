<article class="qcard">
  <header class="qcard__head">
    <nav class="qcard__crumb" aria-label="Question topic">
      <span class="be-badge">{{ question().category }}</span>
      <span class="qcard__sep" aria-hidden="true">/</span>
      <span class="qcard__sub">{{ question().subcategory }}</span>
    </nav>
    <be-difficulty-dots [level]="question().difficulty" [showLabel]="true" />
  </header>

  <div class="qcard__stem">
    <be-code-block [markdown]="question().question" />
  </div>

  <div
    class="qcard__options"
    role="radiogroup"
    [attr.aria-label]="'Answer options'"
  >
    @for (option of options(); track option.value) {
      <be-answer-option
        [text]="option.label"
        [shortcut]="option.shortcut"
        [state]="stateFor(option)"
        [locked]="isAnswered()"
        (pick)="pick.emit(option.value)"
      />
    }
  </div>

  @if (answered(); as ans) {
    <be-explanation-panel
      [explanation]="question().explanation"
      [seniorInsight]="question().seniorInsight"
      [request]="explainRequest()"
    />
  }
</article>
