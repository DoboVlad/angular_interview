name: CI / Deploy to AWS

# Build + test on every push and PR; deploy to S3 only on push to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  id-token: write # required for AWS OIDC role assumption

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Verify — install, unit tests, production build. Runs for pushes and PRs.
  # ---------------------------------------------------------------------------
  verify:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # .npmrc sets legacy-peer-deps=true, so `npm ci` resolves cleanly.
      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-dist
          path: dist/blue-eclipse-quiz/browser
          retention-days: 5

  # ---------------------------------------------------------------------------
  # 2. Deploy — only on push to main. Syncs the built artifact to S3 and
  #    (optionally) invalidates CloudFront.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to S3
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: browser-dist
          path: dist/browser

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Hashed assets: long cache. index.html: never cache (instant deploys).
          aws s3 sync dist/browser "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "max-age=31536000" \
            --exclude "index.html"

          aws s3 cp dist/browser/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DIST_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DIST_ID }}" \
            --paths "/*"
